cubes:

  - name: account
    sql_table: account
    description: "Customer account information. Central table linking loans, transactions, and orders."
    joins:
      - name: district
        sql: "{account}.district_id = {district}.district_id"
        relationship: many_to_one
    dimensions:
      - name: account_id
        sql: account_id
        type: number
        primary_key: true
      - name: frequency
        sql: frequency
        type: string
        description: "Statement issuance frequency code."
      - name: frequency_label
        sql: >
          CASE frequency
            WHEN 'POPLATEK MESICNE'    THEN 'monthly'
            WHEN 'POPLATEK TYDNE'      THEN 'weekly'
            WHEN 'POPLATEK PO OBRATU'  THEN 'after_transaction'
          END
        type: string
        description: "Statement issuance frequency in human-readable format."
      - name: open_date
        sql: date
        type: time
        description: "Account opening date."
      - name: open_year
        sql: "STRFTIME('%Y', date)"
        type: string
        description: "Account opening year."
    measures:
      - name: count
        sql: account_id
        type: count
        description: "Total number of accounts."

  - name: district
    sql_table: district
    description: "Branch location and regional socioeconomic statistics."
    dimensions:
      - name: district_id
        sql: district_id
        type: number
        primary_key: true
      - name: district_name
        sql: A2
        type: string
        description: "District name."
      - name: region
        sql: A3
        type: string
        description: "Region name."
      - name: population
        sql: A4
        type: number
        description: "Number of inhabitants."
      - name: avg_salary
        sql: A11
        type: number
        description: "Average salary in the district."
      - name: unemployment_rate_1995
        sql: A12
        type: number
        description: "Unemployment rate in 1995."
      - name: unemployment_rate_1996
        sql: A13
        type: number
        description: "Unemployment rate in 1996."
      - name: crimes_1995
        sql: A15
        type: number
        description: "Number of committed crimes in 1995."
      - name: crimes_1996
        sql: A16
        type: number
        description: "Number of committed crimes in 1996."
    measures:
      - name: avg_salary_mean
        sql: A11
        type: avg
        description: "Average of district average salaries."

  - name: client
    sql_table: client
    description: "Customer demographic information."
    joins:
      - name: district
        sql: "{client}.district_id = {district}.district_id"
        relationship: many_to_one
    dimensions:
      - name: client_id
        sql: client_id
        type: number
        primary_key: true
      - name: gender
        sql: gender
        type: string
        description: "Gender code."
      - name: gender_label
        sql: "CASE gender WHEN 'M' THEN 'male' WHEN 'F' THEN 'female' END"
        type: string
        description: "Gender in human-readable format."
      - name: birth_date
        sql: birth_date
        type: time
        description: "Date of birth."
      - name: birth_year
        sql: "STRFTIME('%Y', birth_date)"
        type: string
        description: "Birth year."
    measures:
      - name: count
        sql: client_id
        type: count
        description: "Total number of clients."
      - name: female_count
        sql: client_id
        type: count
        filters:
          - sql: "gender = 'F'"
        description: "Number of female clients."
      - name: male_count
        sql: client_id
        type: count
        filters:
          - sql: "gender = 'M'"
        description: "Number of male clients."

  - name: loan
    sql_table: loan
    description: "Loan contract information. Core table for credit rating analysis."
    joins:
      - name: account
        sql: "{loan}.account_id = {account}.account_id"
        relationship: many_to_one
    dimensions:
      - name: loan_id
        sql: loan_id
        type: number
        primary_key: true
      - name: account_id
        sql: account_id
        type: number
      - name: loan_date
        sql: date
        type: time
        description: "Loan approval date."
      - name: loan_year
        sql: "STRFTIME('%Y', date)"
        type: string
        description: "Loan approval year."
      - name: duration
        sql: duration
        type: number
        description: "Loan duration in months."
      - name: monthly_payment
        sql: payments
        type: number
        description: "Monthly payment amount for the loan."
      - name: status
        sql: status
        type: string
        description: "Loan contract status code."
      - name: status_label
        sql: >
          CASE status
            WHEN 'A' THEN 'completed_ok'
            WHEN 'B' THEN 'completed_default'
            WHEN 'C' THEN 'running_ok'
            WHEN 'D' THEN 'running_default'
          END
        type: string
        description: "Loan status in human-readable format."
      - name: is_default
        sql: "CASE WHEN status IN ('B','D') THEN 1 ELSE 0 END"
        type: number
        description: "Default flag. 1 = in default, 0 = normal."
    measures:
      - name: count
        sql: loan_id
        type: count
        description: "Total number of loans."
      - name: total_amount
        sql: amount
        type: sum
        description: "Total loan amount."
      - name: avg_amount
        sql: amount
        type: avg
        description: "Average loan amount."
      - name: default_count
        sql: loan_id
        type: count
        filters:
          - sql: "status IN ('B', 'D')"
        description: "Number of defaulted loans."
      - name: default_rate
        sql: "CAST(SUM(CASE WHEN status IN ('B','D') THEN 1 ELSE 0 END) AS REAL) / COUNT(*) * 100"
        type: number
        description: "Default rate in percentage."
      - name: running_count
        sql: loan_id
        type: count
        filters:
          - sql: "status IN ('C', 'D')"
        description: "Number of currently running loan contracts."

  - name: trans
    sql_table: trans
    description: "Account transaction history including deposits, withdrawals, and transfers."
    joins:
      - name: account
        sql: "{trans}.account_id = {account}.account_id"
        relationship: many_to_one
    dimensions:
      - name: trans_id
        sql: trans_id
        type: number
        primary_key: true
      - name: trans_date
        sql: date
        type: time
        description: "Transaction date."
      - name: trans_year
        sql: "STRFTIME('%Y', date)"
        type: string
      - name: type
        sql: type
        type: string
        description: "Transaction direction. credit = deposit, debit = withdrawal."
      - name: type_label
        sql: type
        type: string
        value_map:
          deposit: "PRIJEM"
          withdrawal: "VYDAJ"
        description: >
          Transaction direction as a human-readable label: 'deposit'
          or 'withdrawal'. Use this (not 'type') when FILTERING by
          transaction direction -- e.g. WHERE trans.type_label =
          'deposit'. The compiler translates the label to the real
          underlying code automatically.
      - name: operation
        sql: operation
        type: string
        description: "Transaction method. cash withdrawal, card withdrawal, cash deposit, etc."
      - name: operation_label
        sql: operation
        type: string
        value_map:
          cash_withdrawal: "VYBER"
          card_withdrawal: "VYBER KARTOU"
          cash_deposit: "VKLAD"
          collection_from_another_bank: "PREVOD Z UCTU"
        description: >
          Transaction method as a human-readable label:
          'cash_withdrawal', 'card_withdrawal', 'cash_deposit', or
          'collection_from_another_bank'. Use this (not 'operation')
          when FILTERING by transaction method -- e.g. WHERE
          trans.operation_label = 'card_withdrawal'. The compiler
          translates the label to the real underlying code
          automatically.
    measures:
      - name: count
        sql: trans_id
        type: count
        description: "Total number of transactions."
      - name: total_amount
        sql: amount
        type: sum
        description: "Total transaction amount."
      - name: avg_amount
        sql: amount
        type: avg
        description: "Average transaction amount."
      - name: avg_balance
        sql: balance
        type: avg
        description: "Average account balance after transaction."

  - name: card
    sql_table: card
    description: "Customer credit card information."
    joins:
      - name: disp
        sql: "{card}.disp_id = {disp}.disp_id"
        relationship: many_to_one
    dimensions:
      - name: card_id
        sql: card_id
        type: number
        primary_key: true
      - name: type
        sql: type
        type: string
        description: "Card tier: classic, gold, or junior."
      - name: issued_date
        sql: issued
        type: time
        description: "Card issuance date."
      - name: issued_year
        sql: "STRFTIME('%Y', issued)"
        type: string
    measures:
      - name: count
        sql: card_id
        type: count
        description: "Total number of cards."
      - name: gold_count
        sql: card_id
        type: count
        filters:
          - sql: "type = 'gold'"
        description: "Number of gold-tier cards."

  - name: disp
    sql_table: disp
    description: "Disposition table linking accounts to clients with access rights."
    joins:
      - name: account
        sql: "{disp}.account_id = {account}.account_id"
        relationship: many_to_one
      - name: client
        sql: "{disp}.client_id = {client}.client_id"
        relationship: many_to_one
    dimensions:
      - name: disp_id
        sql: disp_id
        type: number
        primary_key: true
      - name: type
        sql: type
        type: string
        description: "Disposition type. Primary account holder or secondary holder."
    measures:
      - name: owner_count
        sql: disp_id
        type: count
        filters:
          - sql: "type = 'OWNER'"
        description: "Number of primary account holders."
